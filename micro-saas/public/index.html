<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkShort - Simple URL Shortener</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
    h1 { color: #333; margin-bottom: 1.5rem; text-align: center; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.5rem; color: #666; font-size: 0.9rem; }
    input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
    input:focus { outline: none; border-color: #007bff; }
    button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #0056b3; }
    .result { margin-top: 1.5rem; padding: 1rem; background: #e7f3ff; border-radius: 8px; display: none; }
    .result.show { display: block; }
    .result a { color: #007bff; word-break: break-all; }
    .copy-btn { background: #28a745; margin-top: 8px; }
    .copy-btn:hover { background: #218838; }
    .copy-btn.copied { background: #17a2b8; }
    .error { background: #ffe7e7; color: #c00; }
    .urls { margin-top: 2rem; border-top: 1px solid #eee; padding-top: 1rem; }
    .urls h2 { font-size: 1rem; color: #666; margin-bottom: 1rem; }
    .url-item { padding: 0.75rem; background: #f9f9f9; border-radius: 6px; margin-bottom: 0.5rem; font-size: 0.85rem; }
    .url-item .short { color: #007bff; font-weight: bold; }
    .url-item .clicks { color: #888; }
    .url-item .delete-btn { background: #dc3545; padding: 4px 8px; font-size: 0.75rem; margin-left: 8px; width: auto; }
    .url-item .delete-btn:hover { background: #c82333; }
    .url-item { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔗 LinkShort</h1>
    <div class="form-group">
      <label>Enter your URL</label>
      <input type="url" id="urlInput" placeholder="https://example.com/very-long-url..." required>
    </div>
    <div class="form-group">
      <label>Custom code (optional)</label>
      <input type="text" id="customCode" placeholder="e.g., my-link">
    </div>
    <button onclick="shortenUrl()">Shorten URL</button>
    <div id="result" class="result"></div>
    <div class="urls" id="urlsList"></div>
  </div>

  <script>
    async function copyUrl(url, btn) {
      try {
        await navigator.clipboard.writeText(url);
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      } catch (e) {
        btn.textContent = 'Failed';
      }
    }
    
    async function shortenUrl() {
      const url = document.getElementById('urlInput').value;
      const customCode = document.getElementById('customCode').value;
      const resultDiv = document.getElementById('result');
      
      if (!url) {
        resultDiv.className = 'result show error';
        resultDiv.textContent = 'Please enter a URL';
        return;
      }
      
      try {
        const res = await fetch('/api/shorten', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, customCode: customCode || undefined })
        });
        const data = await res.json();
        
        if (res.ok) {
          resultDiv.className = 'result show';
          const fullUrl = window.location.origin + data.shortUrl;
          resultDiv.innerHTML = `Short URL created!<br><a href="${data.shortUrl}" target="_blank">${fullUrl}</a><button class="copy-btn" onclick="copyUrl('${fullUrl}', this)">Copy</button>`;
          loadUrls();
        } else {
          resultDiv.className = 'result show error';
          resultDiv.textContent = data.error || 'Error creating short URL';
        }
      } catch (e) {
        resultDiv.className = 'result show error';
        resultDiv.textContent = 'Network error';
      }
    }
    
    async function deleteUrl(code) {
      if (!confirm('Delete this short URL?')) return;
      try {
        const res = await fetch('/api/urls/' + code, { method: 'DELETE' });
        if (res.ok) loadUrls();
      } catch (e) {}
    }
    
    async function loadUrls() {
      try {
        const res = await fetch('/api/urls');
        const urls = await res.json();
        const container = document.getElementById('urlsList');
        
        const entries = Object.entries(urls).reverse().slice(0, 10);
        if (entries.length === 0) {
          container.innerHTML = '';
          return;
        }
        
        container.innerHTML = `<h2>Recent Links</h2>` + entries.map(([code, data]) => `
          <div class="url-item">
            <div><span class="short">/${code}</span> → ${data.url.substring(0, 40)}... <span class="clicks">${data.clicks} clicks</span></div>
            <button class="delete-btn" onclick="deleteUrl('${code}')">Delete</button>
          </div>
        `).join('');
      } catch (e) {}
    }
    
    loadUrls();
  </script>
</body>
</html>
